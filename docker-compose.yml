version: '3.8'

services:
  feishu-mcp-server:
    build: .
    image: feishu-mcp-server:latest
    container_name: feishu-mcp-server
    ports:
      - "8088:8088"
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_AUTH_MODE=${FEISHU_AUTH_MODE:-app}
      - MCP_SERVER_TRANSPORT=${MCP_SERVER_TRANSPORT:-both}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3